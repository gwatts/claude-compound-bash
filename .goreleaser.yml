version: 2

builds:
  - id: claude-compound-bash
    binary: claude-compound-bash
    main: ./cmd/claude-compound-bash
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: claude-compound-bash
    ids:
      - claude-compound-bash
    formats:
      - tar.gz
    name_template: "claude-compound-bash_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^release:"
